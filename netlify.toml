[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "vite"
  port = 8888
  targetPort = 5173
  framework = "#custom"

[functions]
  node_bundler = "esbuild"
  included_files = ["src/lib/pricing.ts"]

[functions."pdf-quote"]
  memory_size = 1024
  external_node_modules = ["pdfkit"]

[functions."pdf-subscription"]
  memory_size = 1024
  external_node_modules = ["pdfkit"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
